services:
  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: prefect-server
    entrypoint: >
      sh -c "
      apt-get update && apt-get install -y curl &&
      prefect server start --host 0.0.0.0 --port ${PREFECT_PORT}
      "
    ports:
      - "${PREFECT_PORT}:${PREFECT_PORT}"
    environment:
      PREFECT_UI_URL: "http://localhost:${PREFECT_PORT}/api"
      PREFECT_API_URL: "http://localhost:${PREFECT_PORT}/api"
      PREFECT_SERVER_API_HOST: "0.0.0.0"
    volumes:
      - prefect-data:/root/.prefect
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PREFECT_PORT}/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prefect-net

  prefect-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prefect-worker
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_URL: "http://prefect-server:${PREFECT_PORT}/api"
    entrypoint: >
      sh -c "
      prefect work-pool create local --type process --overwrite &&
      prefect work-pool set-concurrency-limit local 20 &&
      prefect deploy --all &&
      prefect worker start --pool local
      "
    restart: unless-stopped
    networks:
      - prefect-net

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "${PORT_API}:${PORT_API}"
      - "${PORT_FRONT}:${PORT_FRONT}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":${PORT_FRONT}"
    volumes:
      - D:/Dados:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT_API}/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    container_name: minio-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:${PORT_API} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/bronze &&
      mc mb --ignore-existing local/prata &&
      mc mb --ignore-existing local/ouro
      "
volumes:
  prefect-data:

networks:
  prefect-net:
    driver: bridge