name: meu_projeto
prefect-version: 3.0.0

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:
  - name: camara_despesas
    entrypoint: pipelines/camara_deputados/despesas/orquestrador.py:executar_pipeline_despesas
    work_pool:
      name: local
    schedule: null
    parameters: {year}
    tags:
      - camara_deputados

  - name: camara_deputados_deputados
    entrypoint: pipelines/camara_deputados/deputados/orquestrador.py:executar_pipeline_deputados
    work_pool:
      name: local
    schedule: null
    parameters: {data_inicio, data_fim}
    tags:
      - camara_deputados